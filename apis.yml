---
aid: qatar
name: Qatar University
description: >-
  Qatar University is the national public research university of the State of
  Qatar, located in Doha, and ranked #122 in the QS World University Rankings
  2025. Its public, machine-readable developer footprint is concentrated in
  QSpace, the university's institutional repository running on DSpace 7.6, which
  exposes a public OAI-PMH metadata-harvesting endpoint and a public DSpace
  REST/HAL API for scholarly output and academic records. Most other
  institutional systems (Self-Service Banner SIS, library discovery, SSO/MFA)
  are gated behind authentication and do not publish open developer
  documentation.
