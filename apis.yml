apis:
  - aid: qatar:qspace-oai
    name: QSpace OAI-PMH Metadata Endpoint
    description: >-
      Open Archives Initiative Protocol for Metadata Harvesting (OAI-PMH 2.0)
      endpoint for QSpace, the Qatar University institutional repository
      (DSpace 7.6). Supports the standard Identify, ListRecords, ListSets,
      ListMetadataFormats, GetRecord, and ListIdentifiers verbs for harvesting
      repository metadata (Dublin Core and other formats). Verified live with
      repositoryName "Qspace" and protocolVersion 2.0.
    humanURL: https://libguides.qu.edu.qa/quir
    baseURL: https://qspace.qu.edu.qa/server/oai/request
    tags: [ OAI-PMH, Metadata, Institutional Repository, DSpace, Open Access, Research ]
    properties:
      - type: Documentation
        url: https://libguides.qu.edu.qa/quir
  - aid: qatar:qspace-rest
    name: QSpace DSpace REST API
    description: >-
      Public DSpace 7.6 REST/HAL API backing the QSpace institutional
      repository. The API root reports dspaceVersion "DSpace 7.6" and exposes
      HAL-linked resources for communities, collections, items, bitstreams,
      and discovery search. Read operations are public; write operations
      require authentication.
    humanURL: https://libguides.qu.edu.qa/quir
    baseURL: https://qspace.qu.edu.qa/server/api
    tags: [ REST, HAL, Institutional Repository, DSpace, Open Access, Research ]
    properties:
      - type: Documentation
        url: https://libguides.qu.edu.qa/quir
